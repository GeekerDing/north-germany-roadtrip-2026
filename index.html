<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trip Page Removed</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --card: #fffdfa;
      --ink: #1f2520;
      --muted: #58635a;
      --line: #d9d2c6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(126, 145, 123, 0.12), transparent 36%),
        linear-gradient(180deg, #f8f6f1 0%, var(--bg) 100%);
      color: var(--ink);
    }

    main {
      width: min(640px, 100%);
      padding: 40px 32px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 20px 50px rgba(29, 36, 30, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 6vw, 48px);
      line-height: 1.05;
      font-weight: 600;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Trip Page Removed</h1>
    <p>This page has been taken offline and no route details are published here.</p>
  </main>
</body>
</html>
